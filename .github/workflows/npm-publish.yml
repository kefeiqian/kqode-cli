# Publishes the @kqode/kqode-cli npm packages using npm Trusted Publishing (OIDC)
# — no long-lived npm token.
#
# The launcher package (@kqode/kqode-cli) ships no binary; the per-platform
# packages (@kqode/kqode-cli-<platform>-<arch>) carry it and are listed as its
# optionalDependencies. This workflow downloads the tag's GitHub Release archives,
# generates the platform packages from them, then publishes the platform packages
# FIRST and the launcher LAST, so the launcher's optional dependencies already
# exist when a user installs it. Publish only AFTER release.yml has uploaded that
# tag's archives + checksums.
#
# How it runs (every path keeps THIS file as the top-level workflow, which is what
# npm's Trusted Publisher matches — see the OIDC note):
#   - workflow_run: fires automatically when the "Release" workflow finishes. On a
#     successful tag-push release it publishes the just-released version, so a
#     pushed version tag reaches npm with no manual step. Ordering is safe because
#     by "completed" release.yml has already uploaded the tag's assets.
#   - workflow_dispatch: manual (re-)publish for a given tag.
#   - release: published — covers a Release published by hand in the UI.
#
# Every path checks out the released commit (workflow_run: its head_sha;
# dispatch/release: the tag), so the launcher package.json — including its pinned
# @kqode/kqode-cli-<platform>-<arch> versions, kept in lockstep by
# `cargo xtask set-version` — already matches the released version.
#
# OIDC note: npm Trusted Publishing validates the TOP-LEVEL workflow's filename,
# NOT the file that runs `npm publish`. So this must stay a top-level workflow and
# must never be invoked via `workflow_call` from release.yml (npm would then
# validate it as `release.yml` and reject with ENEEDAUTH). workflow_run keeps the
# identity as `npm-publish.yml`, matching the configured Trusted Publisher with no
# npmjs.com change.
#
# One-time setup: EACH package (the launcher plus the five platform packages)
# needs its own npm Trusted Publisher (GitHub Actions, repo kefeiqian/kqode-cli,
# workflow `npm-publish.yml`) and a one-time bootstrap first publish, because a
# trusted publisher cannot be configured for a package that does not exist yet.
# See docs/release/kqode_distribution_registration.md.
name: Publish npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0"
        required: true
        type: string
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ inputs.tag || github.event.release.tag_name || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-22.04
    # For workflow_run, only publish after a SUCCESSFUL tag-push release.
    # release.yml only pushes on `v*` tags, so event == 'push' implies a version
    # tag; workflow_dispatch and release:published always proceed.
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    permissions:
      contents: read # checkout + gh release download
      id-token: write # OIDC token for npm Trusted Publishing
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the exact released commit so the launcher package.json (its
          # version and platform-dependency pins) matches the released version.
          ref: ${{ github.event.workflow_run.head_sha || inputs.tag || github.event.release.tag_name || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Use a Trusted-Publishing-capable npm
        run: npm install -g npm@latest

      - name: Resolve version
        id: rel
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_run" ]; then
            version="$(node -p "require('./packaging/npm/kqode/package.json').version")"
          else
            tag="${INPUT_TAG:-$RELEASE_TAG}"
            [ -n "$tag" ] || { echo "::error::no release tag provided"; exit 1; }
            version="${tag#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved npm version: $version"

      - name: Download the release archives
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          set -euo pipefail
          rm -rf staging && mkdir -p staging
          gh release download "v$VERSION" --dir staging --clobber
          echo "Downloaded assets:"; ls -1 staging

      - name: Generate the platform packages
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          set -euo pipefail
          node packaging/npm/scripts/generate-platform-packages.cjs \
            --archives staging --out dist-packages --version "$VERSION"

      - name: Publish via Trusted Publishing (OIDC)
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Publish a package dir only if that exact name@version is not on the
          # registry yet, so reruns are idempotent. OIDC is auto-detected
          # (id-token: write); provenance is attached automatically on public repos.
          publish_if_absent() {
            local name ver
            name="$(node -p "require('./package.json').name")"
            ver="$(node -p "require('./package.json').version")"
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already published; skipping."
            else
              npm publish --access public
              echo "published $name@$ver"
            fi
          }

          # Platform packages first so the launcher's optionalDependencies resolve.
          # Expect exactly one package per supported target (single source of truth).
          expected="$(node -p "require('./packaging/npm/kqode/lib/resolve.cjs').SUPPORTED_TARGETS.length")"
          published=0
          for dir in dist-packages/*/; do
            ( cd "$dir" && publish_if_absent )
            published=$((published + 1))
          done
          [ "$published" -eq "$expected" ] || { echo "::error::expected $expected platform packages, generated $published"; exit 1; }

          # Then the launcher (stamp its version for the dispatch/release paths;
          # the checked-out commit already carries the matching dependency pins).
          (
            cd packaging/npm/kqode
            npm version "$VERSION" --no-git-tag-version --allow-same-version >/dev/null
            publish_if_absent
          )
