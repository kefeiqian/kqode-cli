# Submits a KQode release to the Windows Package Manager community repository
# (microsoft/winget-pkgs) via vedantmgoyal9/winget-releaser, which reads the
# release's Windows `.zip` asset, regenerates the manifests, and opens a PR to
# winget-pkgs from your fork.
#
# MANUAL BY DESIGN (workflow_dispatch only). winget cannot be fully automated for
# a third-party repo: opening the cross-fork PR to microsoft/winget-pkgs requires
# a CLASSIC PAT with `public_repo` (fine-grained tokens and GitHub App tokens
# cannot create that PR — an App would have to be installed on winget-pkgs, which
# only Microsoft can do), and Microsoft's "Open Source" enterprise rejects classic
# PATs whose lifetime exceeds 8 days. So a long-lived WINGET_TOKEN secret is not
# viable — it would expire within a week.
#
# The token is read from the WINGET_TOKEN *secret*, NOT a workflow input: a
# workflow_dispatch input value is recorded in the run's UI/API and would leak the
# token. Refresh the secret with a fresh (<= 7 day) classic PAT right before each
# run, then dispatch:
#   gh secret set WINGET_TOKEN --repo kefeiqian/kqode-cli   # paste a fresh <=7-day classic PAT
#   gh workflow run "Publish winget" --repo kefeiqian/kqode-cli -f tag=vX.Y.Z
#
# winget-releaser UPDATES an existing package, so the first KefeiQian.KQode version
# must be submitted once by hand (bootstrap). Running komac / wingetcreate locally
# with a fresh token is an equally valid alternative to this workflow. See
# docs/release/kqode_distribution_registration.md.
name: Publish winget

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: winget-publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read # release API read (github.token, inside the action)
    steps:
      - name: Ensure winget token is configured
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -z "$WINGET_TOKEN" ]; then
            echo "::error::WINGET_TOKEN secret is not set. Set a fresh <=7-day classic PAT (public_repo) right before dispatching. See docs/release/kqode_distribution_registration.md (winget)."
            exit 1
          fi

      - name: Resolve version
        id: rel
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          [ -n "$INPUT_TAG" ] || { echo "::error::no release tag provided"; exit 1; }
          version="${INPUT_TAG#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Resolved winget version: $version (tag v$version)"

      # winget ships the x64 zip only; Windows on ARM runs it via emulation (same
      # stance as the npm channel), so the installers-regex matches x64 only.
      - name: Publish to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: KefeiQian.KQode
          version: ${{ steps.rel.outputs.version }}
          release-tag: ${{ steps.rel.outputs.tag }}
          installers-regex: 'kqode-windows-x64\.zip$'
          fork-user: kefeiqian
          token: ${{ secrets.WINGET_TOKEN }}
